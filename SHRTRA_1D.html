const zoneColors = ["#42A5F5", "#66BB6A", "#FFA726", "#EF5350", "#AB47BC", "#26C6DA", "#8D6E63", "#78909C"];
const numZones = 4;

// --- Price chart ---
const priceH = Math.max(500, window.innerHeight - 280);
const priceChart = LightweightCharts.createChart(document.getElementById('price-chart'), {
    width: window.innerWidth,
    height: priceH,
    layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
    grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#2a2e39' },
    timeScale: {
        borderColor: '#2a2e39',
        timeVisible: true,
        secondsVisible: false,
        rightOffset: 5,
    },
});

const candleSeries = priceChart.addCandlestickSeries({
    upColor: '#26a69a', downColor: '#ef5350',
    borderUpColor: '#26a69a', borderDownColor: '#ef5350',
    wickUpColor: '#26a69a', wickDownColor: '#ef5350',
});
candleSeries.setData(candleData);
candleSeries.setMarkers(tradeMarkers);

// Track all overlay series for toggle
const layers = {};

// Flippoint
const fpSeries = priceChart.addLineSeries({
    color: '#FFD700', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dotted,
    lastValueVisible: false, priceLineVisible: false,
});
fpSeries.setData(flippointData);
layers['flippoint'] = fpSeries;

// Upper band
const ubSeries = priceChart.addLineSeries({
    color: '#CE93D8', lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dotted,
    lastValueVisible: false, priceLineVisible: false, visible: false,
});
ubSeries.setData(upperBandData);
layers['upper_band'] = ubSeries;

// Entry levels & Initial SLs per zone
for (let z = 1; z <= numZones; z++) {
    const color = zoneColors[z - 1];
    if (entryLevelData[z]) {
        const s = priceChart.addLineSeries({
            color: color, lineWidth: 1,
            lastValueVisible: false, priceLineVisible: false, visible: false,
        });
        s.setData(entryLevelData[z]);
        layers['entry_' + z] = s;
    }
    if (initialSlData[z]) {
        const s = priceChart.addLineSeries({
            color: color, lineWidth: 1, lineStyle: LightweightCharts.LineStyle.Dashed,
            lastValueVisible: false, priceLineVisible: false, visible: false,
        });
        s.setData(initialSlData[z]);
        layers['init_sl_' + z] = s;
    }
}

// Trail SLs — one line series per segment (trade) so gaps don't connect
for (let z = 1; z <= numZones; z++) {
    if (trailSlData[z]) {
        const seriesList = [];
        for (const seg of trailSlData[z]) {
            const s = priceChart.addLineSeries({
                color: zoneColors[z - 1], lineWidth: 2,
                lastValueVisible: false, priceLineVisible: false,
            });
            s.setData(seg);
            seriesList.push(s);
        }
        layers['trail_' + z] = seriesList;
    }
}

// Dynamic zone entry levels
for (const zStr of Object.keys(dynEntryData)) {
    const z = parseInt(zStr);
    const s = priceChart.addLineSeries({
        color: zoneColors[(z - 1) % zoneColors.length], lineWidth: 1,
        lastValueVisible: false, priceLineVisible: false, visible: false,
    });
    s.setData(dynEntryData[zStr]);
    layers['dyn_entry_' + z] = s;
}

// Dynamic zone initial SLs
for (const zStr of Object.keys(dynInitSlData)) {
    const z = parseInt(zStr);
    const s = priceChart.addLineSeries({
        color: zoneColors[(z - 1) % zoneColors.length], lineWidth: 1,
        lineStyle: LightweightCharts.LineStyle.Dashed,
        lastValueVisible: false, priceLineVisible: false, visible: false,
    });
    s.setData(dynInitSlData[zStr]);
    layers['dyn_init_sl_' + z] = s;
}

// Dynamic zone trails — one series per segment
for (const zStr of Object.keys(dynTrailData)) {
    const z = parseInt(zStr);
    const seriesList = [];
    for (const seg of dynTrailData[zStr]) {
        const s = priceChart.addLineSeries({
            color: zoneColors[(z - 1) % zoneColors.length], lineWidth: 2,
            lineStyle: LightweightCharts.LineStyle.LargeDashed,
            lastValueVisible: false, priceLineVisible: false,
        });
        s.setData(seg);
        seriesList.push(s);
    }
    layers['dyn_trail_' + z] = seriesList;
}

// Markers layer reference
layers['markers'] = 'markers';

// --- Equity chart ---
const eqChart = LightweightCharts.createChart(document.getElementById('equity-chart'), {
    width: window.innerWidth,
    height: 150,
    layout: { background: { type: 'solid', color: '#131722' }, textColor: '#d1d4dc' },
    grid: { vertLines: { color: '#1e222d' }, horzLines: { color: '#1e222d' } },
    rightPriceScale: { borderColor: '#2a2e39' },
    timeScale: { borderColor: '#2a2e39', timeVisible: true, visible: false },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
});

const eqSeries = eqChart.addAreaSeries({
    topColor: 'rgba(66, 165, 245, 0.3)',
    bottomColor: 'rgba(66, 165, 245, 0.02)',
    lineColor: '#42A5F5', lineWidth: 2,
    lastValueVisible: true, priceLineVisible: false,
});
eqSeries.setData(equityData);

// Sync scrolling between charts
priceChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (range) eqChart.timeScale().setVisibleLogicalRange(range);
});
eqChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
    if (range) priceChart.timeScale().setVisibleLogicalRange(range);
});

// --- Clear All button ---
document.getElementById('clear-all-btn').addEventListener('click', () => {
    document.querySelectorAll('.toggle-btn.active').forEach(btn => {
        btn.classList.remove('active');
        const layer = btn.dataset.layer;
        if (layer === 'markers') {
            markersVisible = false;
            candleSeries.setMarkers([]);
        } else if (layers[layer]) {
            const target = layers[layer];
            if (Array.isArray(target)) {
                target.forEach(s => s.applyOptions({ visible: false }));
            } else {
                target.applyOptions({ visible: false });
            }
        }
    });
});

// --- Zone dropdown ---
function setLayerVisible(name, vis) {
    if (!layers[name]) return;
    const target = layers[name];
    if (Array.isArray(target)) {
        target.forEach(s => s.applyOptions({ visible: vis }));
    } else {
        target.applyOptions({ visible: vis });
    }
    // sync toggle button state
    const btn = document.querySelector(`.toggle-btn[data-layer="${name}"]`);
    if (btn) {
        if (vis) btn.classList.add('active');
        else btn.classList.remove('active');
    }
}

document.getElementById('zone-select').addEventListener('change', (e) => {
    const val = e.target.value;

    // Hide ALL zone-specific layers first
    for (let z = 1; z <= numZones; z++) {
        setLayerVisible('entry_' + z, false);
        setLayerVisible('init_sl_' + z, false);
        setLayerVisible('trail_' + z, false);
    }
    for (const zStr of Object.keys(dynTrailData)) {
        setLayerVisible('dyn_entry_' + zStr, false);
        setLayerVisible('dyn_init_sl_' + zStr, false);
        setLayerVisible('dyn_trail_' + zStr, false);
    }

    if (val === 'all') {
        // Show all trails (default state)
        for (let z = 1; z <= numZones; z++) {
            setLayerVisible('trail_' + z, true);
        }
        for (const zStr of Object.keys(dynTrailData)) {
            setLayerVisible('dyn_trail_' + zStr, true);
        }
        candleSeries.setMarkers(tradeMarkers);
        markersVisible = true;
    } else if (val.startsWith('dyn_')) {
        const dz = val.replace('dyn_', '');
        setLayerVisible('dyn_entry_' + dz, true);
        setLayerVisible('dyn_init_sl_' + dz, true);
        setLayerVisible('dyn_trail_' + dz, true);
        const zid = parseInt(dz);
        const filtered = tradeMarkers.filter(m => m.zone === zid);
        candleSeries.setMarkers(filtered);
        markersVisible = true;
    } else {
        const z = parseInt(val);
        setLayerVisible('entry_' + z, true);
        setLayerVisible('init_sl_' + z, true);
        setLayerVisible('trail_' + z, true);
        const filtered = tradeMarkers.filter(m => m.zone === z);
        candleSeries.setMarkers(filtered);
        markersVisible = true;
    }
    // sync markers button
    const mBtn = document.querySelector('.toggle-btn[data-layer="markers"]');
    if (mBtn) { if (markersVisible) mBtn.classList.add('active'); else mBtn.classList.remove('active'); }
});

// --- Toggle buttons ---
let markersVisible = true;
document.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const layer = btn.dataset.layer;
        const isActive = btn.classList.toggle('active');

        if (layer === 'markers') {
            markersVisible = isActive;
            candleSeries.setMarkers(isActive ? tradeMarkers : []);
        } else if (layers[layer]) {
            const target = layers[layer];
            if (Array.isArray(target)) {
                target.forEach(s => s.applyOptions({ visible: isActive }));
            } else {
                target.applyOptions({ visible: isActive });
            }
        }
    });
});

// Resize handler
window.addEventListener('resize', () => {
    const newPriceH = Math.max(500, window.innerHeight - 280);
    priceChart.resize(window.innerWidth, newPriceH);
    eqChart.resize(window.innerWidth, 150);
});

// Fit content
priceChart.timeScale().fitContent();
</script>
